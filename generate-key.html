<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Key Generator | Safari Softwares</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: white; border-radius: 20px; padding: 30px; max-width: 450px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    input, select { width: 100%; padding: 10px; margin: 6px 0; border: 1.5px solid #dce5f2; border-radius: 10px; font-size: 0.9rem; }
    .btn { width: 100%; padding: 14px; background: #134b6e; color: white; border: none; border-radius: 30px; font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 1rem; }
    .btn:hover { background: #0d3a55; }
    .btn-gold { background: linear-gradient(135deg,#f0c040,#e6a800); color: #0f2b40; }
    .output { background: #1a3850; color: #0f0; padding: 14px; border-radius: 10px; margin-top: 10px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; display: none; }
    h2 { color: #0f2b40; text-align: center; }
    .note { font-size: 0.75rem; color: #888; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔑 Premium Key Generator</h2>
    
    <label>Student Name/Email:</label>
    <input type="text" id="studentName" placeholder="e.g. john@gmail.com">
    
    <label>Phone Number (optional):</label>
    <input type="text" id="studentPhone" placeholder="e.g. 0712345678">
    
    <label>Validity (months):</label>
    <select id="months">
      <option value="12">12 months (1 year) - KES 350</option>
      <option value="6">6 months - KES 200</option>
      <option value="3">3 months - KES 100</option>
      <option value="1">1 month - KES 50</option>
    </select>
    
    <label>Custom Password (leave empty for auto-generate):</label>
    <input type="text" id="customPassword" placeholder="Auto-generated if empty">
    
    <button class="btn" onclick="generateKey()">🔑 Generate Key</button>
    <button class="btn btn-gold" onclick="generateAndCopy()">📋 Generate & Copy</button>
    
    <div class="output" id="output"></div>
    
    <p class="note">Key format: <code>SAF-XXXX-XXXX-XXXX</code> | Works on 2 devices</p>
    <p class="note"><a href="admin-login.html">← Admin Login</a> | <a href="index.html">Simulator</a></p>
  </div>

  <script>
    function generateKeyString() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let key = 'SAF';
      for (let i = 0; i < 3; i++) {
        key += '-';
        for (let j = 0; j < 4; j++) {
          key += chars[Math.floor(Math.random() * chars.length)];
        }
      }
      return key;
    }

    function generatePassword() {
      const pwChars = 'abcdefghjkmnpqrstuvwxyz23456789';
      let password = '';
      for (let i = 0; i < 8; i++) {
        password += pwChars[Math.floor(Math.random() * pwChars.length)];
      }
      return password;
    }

    function generateKey() {
      const name = document.getElementById('studentName').value.trim() || 'student';
      const phone = document.getElementById('studentPhone').value.trim();
      const months = parseInt(document.getElementById('months').value);
      let password = document.getElementById('customPassword').value.trim();
      if (!password) password = generatePassword();
      
      const key = generateKeyString();
      const now = new Date();
      const expiry = new Date();
      expiry.setMonth(expiry.getMonth() + months);
      
      const output = document.getElementById('output');
      output.style.display = 'block';
      output.textContent = 
        `✅ KEY GENERATED SUCCESSFULLY\n\n` +
        `🔑 Key:      ${key}\n` +
        `🔒 Password:  ${password}\n` +
        `👤 Student:   ${name}\n` +
        `📱 Phone:     ${phone || 'N/A'}\n` +
        `📅 Created:   ${now.toLocaleDateString()}\n` +
        `⏰ Expires:   ${expiry.toLocaleDateString()}\n` +
        `📆 Duration:  ${months} month(s)\n` +
        `📱 Devices:   2 max\n\n` +
        `📋 Add this line to upgrade.html:\n` +
        `"${key}": { password: "${password}", expires: "${expiry.toISOString().split('T')[0]}" },`;
      
      // Also save to localStorage for admin tracking
      try {
        const keys = JSON.parse(localStorage.getItem('safari_keys') || '[]');
        keys.push({
          key: key,
          password: password,
          student: name,
          phone: phone,
          created: now.toISOString(),
          expires: expiry.toISOString(),
          months: months,
          activated: false,
          devices: []
        });
        localStorage.setItem('safari_keys', JSON.stringify(keys));
      } catch(e) {}
    }

    function generateAndCopy() {
      generateKey();
      const output = document.getElementById('output').textContent;
      navigator.clipboard.writeText(output).then(() => {
        alert('📋 Key details copied to clipboard!');
      }).catch(() => {
        alert('Could not copy automatically. Please select and copy manually.');
      });
    }
  </script>
</body>
</html>
