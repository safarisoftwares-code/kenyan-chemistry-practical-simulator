<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Safari Softwares</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f2b40, #1a4058); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; text-align: center; padding: 20px; }
    .error-container { max-width: 500px; }
    .error-code { font-size: 8rem; font-weight: 900; opacity: 0.3; line-height: 1; }
    .error-title { font-size: 2rem; font-weight: 700; margin: 10px 0; }
    .error-message { font-size: 1rem; opacity: 0.8; margin-bottom: 30px; line-height: 1.6; }
    .btn { display: inline-block; padding: 14px 30px; background: #f0c040; color: #0f2b40; text-decoration: none; border-radius: 30px; font-weight: 700; transition: 0.2s; }
    .btn:hover { background: #e6a800; transform: translateY(-2px); }
    .links { margin-top: 30px; font-size: 0.85rem; opacity: 0.6; }
    .links a { color: #f0c040; text-decoration: none; margin: 0 10px; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <div class="error-title">🧪 Page Not Found</div>
    <div class="error-message">
      Oops! The page you're looking for has evaporated like ether in an open beaker.<br>
      It might have been moved, deleted, or never existed.
    </div>
    <a href="index.html" class="btn">🏠 Back to Simulator</a>
    <div class="links">
      <a href="index.html">Simulator</a> •
      <a href="upgrade.html">Upgrade</a> •
      <a href="contact.html">Contact</a>
    </div>
  </div>
</body>
</html>
