<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Safari Softwares</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, #0f2b40 0%, #1a4058 60%, #1f4d6e 100%); 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      padding: 20px;
    }
    .login-card { 
      background: white; 
      border-radius: 20px; 
      padding: 40px 30px; 
      max-width: 420px; 
      width: 100%; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
      text-align: center;
    }
    .login-card .logo { font-size: 4rem; margin-bottom: 10px; }
    .login-card h2 { color: #0f2b40; margin-bottom: 6px; font-size: 1.5rem; }
    .login-card .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
    input { 
      width: 100%; 
      padding: 14px; 
      margin: 8px 0; 
      border: 2px solid #dce5f2; 
      border-radius: 12px; 
      font-size: 1rem; 
      text-align: center;
    }
    input:focus { outline: none; border-color: #134b6e; }
    .btn { 
      width: 100%; 
      padding: 14px; 
      background: #134b6e; 
      color: white; 
      border: none; 
      border-radius: 12px; 
      font-size: 1rem; 
      font-weight: 700; 
      cursor: pointer; 
      margin-top: 14px;
    }
    .btn:hover { background: #0d3a55; }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .error { 
      background: #fadbd8; 
      color: #e74c3c; 
      padding: 12px; 
      border-radius: 8px; 
      margin-top: 12px; 
      font-size: 0.85rem;
      display: none;
    }
    .success { 
      background: #d5f5e3; 
      color: #27ae60; 
      padding: 12px; 
      border-radius: 8px; 
      margin-top: 12px; 
      font-size: 0.85rem;
      display: none;
    }
    .hint { 
      font-size: 0.75rem; 
      color: #aaa; 
      margin-top: 20px; 
      line-height: 1.6;
    }
    .hint a { color: #888; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }
    
    #step2 { display: none; margin-top: 16px; padding-top: 16px; border-top: 2px solid #f0c040; }
    #step2 p { margin: 6px 0; }
    #step2 .code-hint { font-size: 0.75rem; color: #888; margin-top: 8px; }
    #step2 .code-hint a { color: #134b6e; font-weight: 600; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🔬</div>
    <h2>Safari Softwares</h2>
    <p class="subtitle">Admin Dashboard Access</p>
    
    <!-- Step 1: Password -->
    <div id="step1">
      <input type="password" id="passwordInput" placeholder="🔒 Enter Admin Password" autocomplete="off">
      <button class="btn" id="passwordBtn" onclick="checkPassword()">🔐 Login</button>
      <div class="error" id="passwordError"></div>
    </div>
    
    <!-- Step 2: 2FA Code -->
    <div id="step2">
      <p style="color:#27ae60;font-weight:600;">✅ Password accepted!</p>
      <p style="color:#888;">Enter the 6-digit verification code:</p>
      <input type="text" id="totpInput" placeholder="000000" maxlength="6" autocomplete="off" style="letter-spacing:10px;font-size:1.5rem;">
      <button class="btn" id="totpBtn" onclick="checkTOTP()">🔐 Verify & Enter Dashboard</button>
      <div class="error" id="totpError"></div>
      <p class="code-hint">💡 Open <a href="totp-helper.html" target="_blank">totp-helper.html</a> in a new tab to get the current code</p>
    </div>
    
    <div class="hint">
      <p>⚠️ Authorized personnel only</p>
      <p>Access is logged and monitored</p>
      <p style="margin-top:6px;"><a href="index.html">← Back to Simulator</a></p>
    </div>
  </div>

  <script>
    // ============ CONFIGURATION ============
    var MASTER_PASSWORD = 'SafariAdmin2026!';  // CHANGE THIS
    var TOTP_SECRET = 'SAFARI_SOFTWARES_ADMIN_2026';  // CHANGE THIS
    var MAX_ATTEMPTS = 5;
    var failedAttempts = 0;

    // ============ TOTP GENERATOR ============
    function getCurrentTOTP() {
      var timeWindow = Math.floor(Date.now() / 30000);
      var secretSum = 0;
      for (var i = 0; i < TOTP_SECRET.length; i++) {
        secretSum += TOTP_SECRET.charCodeAt(i);
      }
      var code = ((timeWindow * secretSum * 7 + 13) % 900000) + 100000;
      return code.toString();
    }

    function isTOTPValid(inputCode) {
      var current = getCurrentTOTP();
      var prevWindow = Math.floor(Date.now() / 30000) - 1;
      var secretSum = 0;
      for (var i = 0; i < TOTP_SECRET.length; i++) {
        secretSum += TOTP_SECRET.charCodeAt(i);
      }
      var previous = (((prevWindow * secretSum * 7 + 13) % 900000) + 100000).toString();
      return (inputCode === current || inputCode === previous);
    }

    // ============ STEP 1: PASSWORD CHECK ============
    function checkPassword() {
      var password = document.getElementById('passwordInput').value.trim();
      var errorDiv = document.getElementById('passwordError');
      
      if (!password) {
        errorDiv.textContent = 'Please enter your password.';
        errorDiv.style.display = 'block';
        return;
      }

      if (password === MASTER_PASSWORD) {
        // Password correct - show 2FA step
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('totpInput').focus();
        failedAttempts = 0;
        errorDiv.style.display = 'none';
      } else {
        // Password wrong
        failedAttempts++;
        errorDiv.style.display = 'block';
        
        if (failedAttempts >= MAX_ATTEMPTS) {
          errorDiv.textContent = '🚫 Too many failed attempts! Please wait 15 minutes.';
          document.getElementById('passwordBtn').disabled = true;
          setTimeout(function() {
            document.getElementById('passwordBtn').disabled = false;
            failedAttempts = 0;
            errorDiv.style.display = 'none';
          }, 15 * 60 * 1000);
        } else {
          var remaining = MAX_ATTEMPTS - failedAttempts;
          errorDiv.textContent = '❌ Incorrect password. ' + remaining + ' attempt(s) remaining.';
        }
        
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    }

    // ============ STEP 2: TOTP CHECK ============
    function checkTOTP() {
      var code = document.getElementById('totpInput').value.trim();
      var errorDiv = document.getElementById('totpError');
      var btn = document.getElementById('totpBtn');
      
      if (!code || code.length !== 6) {
        errorDiv.textContent = 'Please enter the 6-digit code.';
        errorDiv.style.display = 'block';
        return;
      }

      if (isTOTPValid(code)) {
        // SUCCESS!
        errorDiv.style.display = 'none';
        btn.disabled = true;
        btn.textContent = '✅ Access granted! Redirecting...';
        btn.style.background = '#27ae60';
        
        // Create session
        sessionStorage.setItem('safari_admin_auth', 'true');
        sessionStorage.setItem('safari_admin_session', 'admin_' + Date.now());
        sessionStorage.setItem('safari_admin_expires', new Date(Date.now() + 8 * 3600000).toISOString());
        
        // Redirect to admin dashboard
        setTimeout(function() {
          window.location.href = 'admin.html';
        }, 800);
        
      } else {
        errorDiv.textContent = '❌ Invalid code. Make sure totp-helper.html shows the current code.';
        errorDiv.style.display = 'block';
        document.getElementById('totpInput').value = '';
        document.getElementById('totpInput').focus();
      }
    }

    // ============ ENTER KEY SUPPORT ============
    document.getElementById('passwordInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    document.getElementById('totpInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkTOTP();
    });

    // ============ CHECK IF ALREADY LOGGED IN ============
    (function() {
      var auth = sessionStorage.getItem('safari_admin_auth');
      var expires = sessionStorage.getItem('safari_admin_expires');
      
      if (auth === 'true' && expires && new Date(expires) > new Date()) {
        document.getElementById('step1').innerHTML = '<p style="color:#27ae60;font-weight:600;font-size:1.1rem;">✅ You are already logged in!</p><a href="admin.html" style="display:inline-block;padding:14px 30px;background:#134b6e;color:white;text-decoration:none;border-radius:12px;font-weight:700;margin-top:10px;">🚀 Go to Dashboard</a>';
      }
    })();
  </script>
</body>
</html>
